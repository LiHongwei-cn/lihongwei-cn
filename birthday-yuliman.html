<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>余李满 · 21 岁生日快乐 🏍️</title>
<meta name="description" content="余李满，21 岁生日快乐！今天你是世一摩，瓦里自己 C，三角洲把把出非洲之心。">
<style>
:root {
  --bg: #0a0a14;
  --gold: #f0c060;
  --gold-light: #fde68a;
  --rose: #f472b6;
  --text: #e4e4e7;
  --dim: rgba(255,255,255,0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: default;
  user-select: none;
  -webkit-user-select: none;
}

canvas#fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
canvas#confetti  { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

.main {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 48px 32px;
  max-width: 640px;
  width: 100%;
}

/* 年龄大数字 */
.age-ring {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 2px solid rgba(240,192,96,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  position: relative;
  animation: ringPulse 3s ease-in-out infinite;
}
.age-ring::before {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(240,192,96,0.08);
  animation: ringPulse 3s ease-in-out 0.5s infinite;
}
.age-num {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(180deg, #fde68a 0%, #f0c060 40%, #d97706 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); border-color: rgba(240,192,96,0.2); }
  50% { transform: scale(1.04); border-color: rgba(240,192,96,0.5); }
}

/* 蜡烛 */
.candle-row {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 20px;
  margin-bottom: 36px;
}

.candle-wrap { display: flex; flex-direction: column; align-items: center; }

.flame {
  width: 12px; height: 22px;
  background: radial-gradient(ellipse at 50% 80%, #fff 0%, #fbbf24 40%, #f97316 100%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 0.13s infinite alternate ease-in-out;
  margin-bottom: -1px;
}

.candle {
  width: 16px; height: 44px;
  border-radius: 4px 4px 2px 2px;
}

.c1 { background: linear-gradient(180deg, #fbbf24, #f59e0b); }
.c2 { background: linear-gradient(180deg, #f472b6, #ec4899); }
.c3 { background: linear-gradient(180deg, #a78bfa, #8b5cf6); }
.c4 { background: linear-gradient(180deg, #34d399, #10b981); }
.c5 { background: linear-gradient(180deg, #f87171, #ef4444); }
.c6 { background: linear-gradient(180deg, #60a5fa, #3b82f6); }
.c7 { background: linear-gradient(180deg, #fb923c, #ea580c); }

@keyframes flicker {
  0% { transform: scale(1, 0.95) translateY(0); opacity: 0.9; }
  100% { transform: scale(1.12, 1.1) translateY(-2px); opacity: 1; }
}

/* 主文字 */
.greeting {
  font-size: 54px;
  font-weight: 850;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), #d97706);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  0% { filter: drop-shadow(0 0 6px rgba(240,192,96,0.25)); }
  100% { filter: drop-shadow(0 0 18px rgba(240,192,96,0.55)); }
}

.name-display {
  font-size: 38px;
  font-weight: 750;
  letter-spacing: 5px;
  margin-bottom: 30px;
  color: #fff;
}

.wish-text {
  font-size: 17px;
  line-height: 2.1;
  color: var(--dim);
  max-width: 440px;
  margin: 0 auto 40px;
}
.wish-text span {
  display: block;
  opacity: 0;
  animation: fadeInLine 0.7s ease forwards;
}
.wish-text span:nth-child(1) { animation-delay: 0.5s; }
.wish-text span:nth-child(2) { animation-delay: 1.0s; }
.wish-text span:nth-child(3) { animation-delay: 1.5s; }
.wish-text span:nth-child(4) { animation-delay: 2.0s; }
.wish-text span:nth-child(5) { animation-delay: 2.5s; }

@keyframes fadeInLine {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* 漂浮元素 */
.floating-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}

.float-emoji {
  position: absolute;
  font-size: 28px;
  animation: floatUp linear infinite;
  opacity: 0;
}

/* zmjjkk 语录气泡 */
.float-quote {
  position: absolute;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 6px 16px;
  white-space: nowrap;
  animation: floatUp linear infinite;
  opacity: 0;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
  box-shadow: 0 0 20px rgba(255,200,50,0.1);
}

/* 三角洲大红物品 */
.float-red {
  position: absolute;
  font-size: 14px;
  font-weight: 700;
  color: #ff4444;
  background: rgba(255,0,0,0.08);
  border: 1px solid rgba(255,80,80,0.3);
  border-radius: 6px;
  padding: 4px 12px;
  white-space: nowrap;
  animation: floatUp linear infinite;
  opacity: 0;
  text-shadow: 0 0 12px rgba(255,0,0,0.6);
  box-shadow: 0 0 16px rgba(255,0,0,0.08);
}

@keyframes floatUp {
  0% { transform: translateY(105vh) rotate(0deg) scale(0.4); opacity: 0; }
  5% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity: 0; }
}

/* 点击涟漪 */
.ripple {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  font-size: 36px;
  animation: rippleOut 0.9s ease-out forwards;
}

@keyframes rippleOut {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}

/* 底部 */
.hint {
  margin-top: 44px;
  font-size: 13px;
  color: rgba(255,255,255,0.18);
  animation: fadeInLine 0.8s ease 3.5s forwards;
  opacity: 0;
  letter-spacing: 1px;
}

/* 响应式 */
@media (max-width: 480px) {
  .greeting { font-size: 38px; }
  .name-display { font-size: 28px; letter-spacing: 3px; }
  .wish-text { font-size: 15px; padding: 0 12px; }
  .age-ring { width: 80px; height: 80px; }
  .age-num { font-size: 38px; }
  .candle-row { gap: 12px; }
  .candle { width: 13px; height: 36px; }
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>
<canvas id="confetti"></canvas>
<div class="floating-layer" id="floatingLayer"></div>

<main class="main">

  <!-- 21 岁金环 -->
  <div class="age-ring">
    <span class="age-num">21</span>
  </div>

  <!-- 7 根蜡烛 -->
  <div class="candle-row">
    <div class="candle-wrap"><div class="flame"></div><div class="candle c1"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c2"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c3"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c4"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c5"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c6"></div></div>
    <div class="candle-wrap"><div class="flame"></div><div class="candle c7"></div></div>
  </div>

  <h1 class="greeting">生日快乐</h1>
  <p class="name-display">余李满</p>

  <div class="wish-text">
    <span>21 岁了牢弟，CSGO 还是那么下饭 🍚</span>
    <span>每次说"好简单"，看看战绩谁在 C 🔫</span>
    <span>瓦里别光送，生日局我来带你飞 🎯</span>
    <span>三角洲你跟在我后面舔包就行了 🔴</span>
    <span>生日快乐牢弟，新的一岁枪法能不能涨涨 🏍️💨</span>
  </div>

  <p class="hint">— 点屏幕放烟花 · 点多了说不定能点到 CSGO 不白给 —</p>
</main>

<script>
// ============ 烟花 ============
const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
let W, H;

function resize() {
  W = fwCanvas.width = window.innerWidth;
  H = fwCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 6;
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s;
    this.color = color;
    this.alpha = 1;
    this.decay = 0.006 + Math.random() * 0.022;
    this.size = 2 + Math.random() * 2.8;
    this.gravity = 0.04;
  }
  update() {
    this.vx *= 0.99; this.vy *= 0.99;
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.alpha -= this.decay;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const particles = [];
const COLORS = ['#fbbf24','#f59e0b','#f472b6','#a78bfa','#34d399','#f87171','#60a5fa','#fde68a','#fff','#fb923c','#c084fc'];

function spawnFirework(x, y) {
  const cx = x || (W * 0.15 + Math.random() * W * 0.7);
  const cy = y || (H * 0.1 + Math.random() * H * 0.45);
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  for (let i = 0; i < 45 + Math.floor(Math.random() * 55); i++) {
    particles.push(new Particle(cx, cy, color));
  }
}

function drawFireworks() {
  fwCtx.fillStyle = 'rgba(10,10,20,0.18)';
  fwCtx.fillRect(0, 0, W, H);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw(fwCtx);
    if (p.alpha <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(drawFireworks);
}

// 开场烟花
for (let i = 0; i < 6; i++) { setTimeout(() => spawnFirework(), i * 280); }
setInterval(() => { if (Math.random() < 0.55) spawnFirework(); }, 1300);
drawFireworks();

// ============ 纸屑 ============
const cfCanvas = document.getElementById('confetti');
const cfCtx = cfCanvas.getContext('2d');
cfCanvas.width = W; cfCanvas.height = H;
window.addEventListener('resize', () => { cfCanvas.width = W; cfCanvas.height = H; });

const confettiPieces = [];
const CF_COLORS = ['#fbbf24','#f472b6','#a78bfa','#34d399','#f87171','#60a5fa','#fde68a','#fb923c','#c084fc','#67e8f9'];

class Confetti {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * cfCanvas.width;
    this.y = init ? Math.random() * -cfCanvas.height : -20;
    this.w = 5 + Math.random() * 10;
    this.h = 3 + Math.random() * 7;
    this.color = CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)];
    this.vy = 1.2 + Math.random() * 3.2;
    this.vx = (Math.random() - 0.5) * 2;
    this.rot = Math.random() * 360;
    this.rs = (Math.random() - 0.5) * 8;
    this.sw = Math.random() * 0.03;
    this.sp = Math.random() * Math.PI * 2;
  }
  update() {
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.y * this.sw + this.sp) * 0.9;
    this.rot += this.rs;
    if (this.y > cfCanvas.height + 30) this.reset(false);
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot * Math.PI / 180);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  }
}

for (let i = 0; i < 90; i++) confettiPieces.push(new Confetti());
function drawConfetti() {
  cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  for (const c of confettiPieces) { c.update(); c.draw(cfCtx); }
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

// ============ 漂浮系统：emoji + zmjjkk 语录 + 三角洲大红 ============
const floatLayer = document.getElementById('floatingLayer');

const EMOJIS = ['🎂','🎉','🎈','🎁','🎊','🏍️','🔫','💣','🪂','💨','🥳','🔥','🍰','💐','🕯️','💖','🎆','⚡','🏆','💀','🎮','🤡','🐔','🍚','😭','🤙'];

// 语录：串康康 + 串牢弟 + CSGO梗，越变态越好
const ZMJJKK_QUOTES = [
  '都是同龄人，我原本没想降维打击',
  '面善打个D啊，喜欢我的战斗脸吗？',
  '好简单~（0-16版）',
  '老子是冠军，他是什么啊？',
  '你是觉得哥不会自己起狙吗？',
  '再见了牢弟😁 回来吧牢大哥😭',
  'KK就是最大的串子',
  '从容地跳入悬崖',
  '俺は世界最強のデュエリストだ！',
  '哈基康来了，全体起立',
  '成都戴夫申请出战',
  '这把我有手感（然后白给）',
  '我起了，一枪秒了，有什么好说的',
  '别送，跟在我后面',
  '不是我菜，是对面开挂了',
  '这枪法，余李满教的？',
  '又是我C，习惯了',
  'eco局起连狙，这就是牢弟',
];

// 三角洲部队大红物品（真实顶级物资）
const DELTA_RED_ITEMS = [
  '🔴 海洋之泪',
  '🔴 非洲之心',
  '🔴 复苏呼吸机',
  '🔴 装甲车电池',
  '🔴 微型反应炉',
  '🔴 曼德尔超算单元',
  '🔴 万金泪冠',
  '🔴 试制聚变供能单元',
  '🔴 便携军用雷达',
  '🔴 ECMO',
  '🔴 绝密服务器',
  '🔴 坦克模型',
];

function spawnEmoji() {
  const el = document.createElement('span');
  el.className = 'float-emoji';
  el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  el.style.left = Math.random() * 94 + '%';
  el.style.fontSize = (20 + Math.random() * 22) + 'px';
  el.style.animationDuration = (8 + Math.random() * 12) + 's';
  el.style.animationDelay = Math.random() * 2 + 's';
  floatLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function spawnQuote() {
  const el = document.createElement('span');
  el.className = 'float-quote';
  el.textContent = ZMJJKK_QUOTES[Math.floor(Math.random() * ZMJJKK_QUOTES.length)];
  el.style.left = Math.random() * 88 + '%';
  el.style.animationDuration = (10 + Math.random() * 14) + 's';
  el.style.animationDelay = Math.random() * 3 + 's';
  floatLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function spawnRedItem() {
  const el = document.createElement('span');
  el.className = 'float-red';
  el.textContent = DELTA_RED_ITEMS[Math.floor(Math.random() * DELTA_RED_ITEMS.length)];
  el.style.left = Math.random() * 88 + '%';
  el.style.animationDuration = (11 + Math.random() * 13) + 's';
  el.style.animationDelay = Math.random() * 4 + 's';
  floatLayer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// 初始一波
for (let i = 0; i < 6; i++) { setTimeout(() => spawnEmoji(), i * 300); }
for (let i = 0; i < 3; i++) { setTimeout(() => spawnQuote(), 500 + i * 600); }
for (let i = 0; i < 3; i++) { setTimeout(() => spawnRedItem(), 800 + i * 700); }

// 持续生成，控制每种比例
setInterval(() => {
  if (floatLayer.children.length > 25) return;
  const r = Math.random();
  if (r < 0.35) spawnEmoji();
  else if (r < 0.65) spawnQuote();
  else spawnRedItem();
}, 1200);

// ============ 交互 ============
document.addEventListener('click', (e) => {
  spawnFirework(e.clientX, e.clientY);

  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const r = Math.random();
  if (r < 0.33) {
    ripple.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  } else if (r < 0.66) {
    ripple.textContent = ZMJJKK_QUOTES[Math.floor(Math.random() * ZMJJKK_QUOTES.length)];
    ripple.style.fontSize = '24px';
    ripple.style.fontWeight = '700';
    ripple.style.color = '#fff';
    ripple.style.textShadow = '0 0 16px rgba(255,255,255,0.7)';
  } else {
    ripple.textContent = DELTA_RED_ITEMS[Math.floor(Math.random() * DELTA_RED_ITEMS.length)];
    ripple.style.fontSize = '20px';
    ripple.style.fontWeight = '700';
    ripple.style.color = '#ff4444';
    ripple.style.textShadow = '0 0 16px rgba(255,0,0,0.8)';
  }
  ripple.style.left = e.clientX + 'px';
  ripple.style.top = e.clientY + 'px';
  document.body.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
});

document.addEventListener('keydown', () => spawnFirework());
</script>
</body>
</html>
