<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="页面未找到">
<title>404 - 页面未找到</title>
<style>
  :root {
    --bg1: #0f0c29; --bg2: #302b63; --bg3: #24243e;
    --accent: #6c8cff; --text: #e8e8e8; --card: rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 0 20px; }
  .card {
    background: var(--card); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 48px; text-align: center;
  }
  h1 { font-size: 72px; margin: 0; color: var(--accent); }
  p { margin: 16px 0; line-height: 1.6; }
  .back-link { display: inline-block; color: var(--accent); text-decoration: none; margin-top: 8px; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>404</h1>
    <p>页面不存在，可能已被移动或删除。</p>
    <p><a href="./" class="back-link">返回首页</a></p>
  </div>
</div>
</body>
</html>
