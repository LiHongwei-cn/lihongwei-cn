<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面未找到</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --text:#c9d1d9; --accent:#58a6ff; }
  body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .card { background:var(--card); border-radius:12px; padding:48px; text-align:center; max-width:480px; margin:20px; }
  h1 { font-size:72px; margin:0; color:var(--accent); }
  p { margin:16px 0; line-height:1.6; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="card">
  <h1>404</h1>
  <p>页面不存在，可能已被移动或删除。</p>
  <p><a href="/">返回首页</a></p>
</div>
</body>
</html>
