name: Mundo Daily Journal

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  journal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Crawl journals and generate skills
        run: |
          cd mundo-cloud
          bash scripts/daily_journal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
