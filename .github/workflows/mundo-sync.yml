name: Mundo Daily Sync

on:
  schedule:
    - cron: '0 19 * * *'  # UTC 19:00 = 北京时间 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync skills registry
        run: |
          cd mundo-cloud/scripts
          python3 sync_local.py || true
          python3 quality_scorer.py || true

      - name: Commit and push
        run: |
          git config user.name "Mundo Bot"
          git config user.email "mundo-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: mundo daily sync — $(date +%Y-%m-%d)"
            git push
          fi
