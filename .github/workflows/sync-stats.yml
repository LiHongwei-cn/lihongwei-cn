name: Sync Stats

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync counterapi.dev → stats.json
        run: |
          PAGES="home matlab-tool desktop-launcher claude-code-tutorial vpn-guide win-optimize github-trending ccs-launcher global-specs"

          echo "{" > stats.json
          FIRST=true
          for page in $PAGES; do
            count=$(curl -sL "https://api.counterapi.dev/v1/lihongwei-cn/${page}/" | python3 -c "import sys,json; print(json.load(sys.stdin).get('count',0))" 2>/dev/null || echo 0)
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> stats.json
            fi
            printf '  "%s": %s' "$page" "$count" >> stats.json
          done
          echo "" >> stats.json
          echo "}" >> stats.json
          cat stats.json

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: 同步访问计数 stats.json"
            git push
          fi
