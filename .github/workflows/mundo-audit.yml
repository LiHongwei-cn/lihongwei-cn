name: Mundo Weekly Audit

on:
  schedule:
    - cron: '0 1 * * 0'  # UTC 01:00 周日 = 北京时间 09:00 周日
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Quality audit
        run: |
          cd mundo-cloud/scripts
          python3 quality_scorer.py || true

      - name: Commit and push
        run: |
          git config user.name "Mundo Bot"
          git config user.email "mundo-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: mundo weekly audit — $(date +%Y-%m-%d)"
            git push
          fi
