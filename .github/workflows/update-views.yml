name: Update Page Views

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch busuanzi page views
        run: |
          BASE_URL="https://lihongwei-cn.github.io/lihongwei-cn"
          API="https://busuanzi.ibruce.info/busuanzi?jsonpCallback=x"
          PAGES=(
            "mundo-agent"
            "skill-store"
            "matlab"
            "global-specs"
            "ai-anatomy"
            "claude-code-tutorial"
            "hermes-guide"
            "vpn-guide"
            "win-optimize"
          )

          echo '{' > assets/page-views.json
          first=true
          for page in "${PAGES[@]}"; do
            result=$(curl -s --max-time 10 \
              -H "Referer: ${BASE_URL}/${page}/" \
              "$API" 2>/dev/null || echo '{}')
            pv=$(echo "$result" | sed -n 's/.*"page_pv":\([0-9]*\).*/\1/p')
            [ -z "$pv" ] && pv=0
            if [ "$first" = true ]; then
              first=false
            else
              echo ',' >> assets/page-views.json
            fi
            printf '  "%s": %s' "$page" "$pv" >> assets/page-views.json
          done
          echo '' >> assets/page-views.json
          echo '}' >> assets/page-views.json

          cat assets/page-views.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/page-views.json
          git diff --cached --quiet || git commit -m "chore: update page views" && git push
