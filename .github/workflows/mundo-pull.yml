name: Mundo Pull Latest

on:
  schedule:
    - cron: '0 20 * * *'  # UTC 20:00 = 北京时间 04:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest and push
        run: |
          git config user.name "Mundo Bot"
          git config user.email "mundo-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git push
