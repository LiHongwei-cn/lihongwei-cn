<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="PC Builder — 输入预算和需求，获取最优硬件配置方案">
<title>PC Builder — 硬件配置推荐</title>
<style>
:root {
  --bg: #0d0d16;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.05);
  --border-hover: rgba(255,255,255,0.1);
  --text: #e8e8ed;
  --dim: rgba(255,255,255,0.42);
  --faint: rgba(255,255,255,0.18);
  --accent: #818cf8;
  --accent-glow: rgba(129,140,248,0.15);
  --green: #4ade80;
  --yellow: #facc15;
  --orange: #fb923c;
  --red: #f87171;
  --cyan: #22d3ee;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 20px 40px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -30%; left: -10%;
  width: 120%; height: 130%;
  background:
    radial-gradient(ellipse at 30% 0%, rgba(99,102,241,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 70%, rgba(168,85,247,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.container { width: 100%; max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

.header { text-align: center; margin-bottom: 36px; }
.header h1 { font-size: 22px; font-weight: 750; letter-spacing: -0.4px; }
.header p { font-size: 13px; color: var(--dim); margin-top: 6px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
.panel-title { font-size: 14px; font-weight: 700; margin-bottom: 18px; color: var(--text); display: flex; align-items: center; gap: 8px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; color: var(--dim); font-weight: 600; letter-spacing: 0.3px; }

.form-group input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
}
.form-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); cursor: pointer;
}

.budget-display { font-size: 20px; font-weight: 750; color: var(--accent); text-align: center; margin: 2px 0; }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-option {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.btn-option:hover { border-color: var(--border-hover); color: var(--text); }
.btn-option.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

.btn-primary {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; font-family: inherit; margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
.btn-primary:active { transform: translateY(0); }

.results { display: none; }
.results.show { display: block; }

.config-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }

.config-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px; transition: all 0.25s; cursor: pointer; position: relative;
}
.config-card:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.04); }
.config-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 4px 20px rgba(99,102,241,0.15); }

.config-tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 10px; }
.tag-budget { background: rgba(74,222,128,0.15); color: var(--green); }
.tag-balanced { background: rgba(129,140,248,0.15); color: var(--accent); }
.tag-performance { background: rgba(251,146,60,0.15); color: var(--orange); }

.config-total { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
.config-total .currency { font-size: 16px; font-weight: 600; color: var(--dim); margin-right: 2px; }
.config-desc { font-size: 12px; color: var(--dim); margin-bottom: 14px; }

.component-list { display: flex; flex-direction: column; gap: 6px; }
.comp-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.comp-row:last-child { border-bottom: none; }
.comp-type { width: 36px; color: var(--faint); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.comp-name { flex: 1; margin: 0 10px; color: var(--text); }
.comp-price { color: var(--dim); font-size: 12px; }

/* Refresh Rate Selector */
.refresh-rate-selector { display: flex; gap: 8px; margin-top: 8px; }
.refresh-btn {
  flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); font-size: 11px; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.refresh-btn:hover { border-color: var(--border-hover); color: var(--text); }
.refresh-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34,211,238,0.1); }

/* FPS Table */
.fps-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
.fps-table th { text-align: left; padding: 8px; color: var(--faint); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.fps-table td { padding: 8px; border-top: 1px solid rgba(255,255,255,0.03); }
.fps-table .fps-value { font-weight: 700; }
.fps-high { color: var(--green); }
.fps-medium { color: var(--yellow); }
.fps-low { color: var(--red); }

/* Platform Deals */
.deals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 12px; }
.deal-card {
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px; padding: 14px; transition: all 0.2s;
}
.deal-card:hover { border-color: var(--border-hover); }
.deal-platform { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.deal-price { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.deal-price.best { color: var(--green); }
.deal-link { font-size: 11px; color: var(--accent); text-decoration: none; }
.deal-link:hover { text-decoration: underline; }

/* Edit Config Modal */
.edit-modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
}
.edit-modal.show { display: flex; }
.edit-content {
  background: #1a1a2e; border: 1px solid var(--border-hover); border-radius: 16px;
  padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
}
.edit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.edit-header h3 { font-size: 16px; font-weight: 700; }
.edit-close {
  background: none; border: none; color: var(--dim); font-size: 20px; cursor: pointer;
  padding: 4px 8px; border-radius: 6px;
}
.edit-close:hover { color: var(--text); background: var(--surface); }

.edit-row {
  display: grid; grid-template-columns: 80px 1fr 100px; gap: 12px;
  align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.edit-label { font-size: 11px; color: var(--faint); font-weight: 600; text-transform: uppercase; }
.edit-select {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; color: var(--text); font-size: 12px; font-family: inherit;
}
.edit-select:focus { outline: none; border-color: var(--accent); }
.edit-price { font-size: 13px; color: var(--dim); text-align: right; }

.edit-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-save {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #059669, #34d399); color: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-reset {
  padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); font-size: 13px; cursor: pointer; font-family: inherit;
}

.share-bar {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);
}
.btn-share {
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--dim); font-size: 12px; cursor: pointer;
  font-family: inherit; display: flex; align-items: center; gap: 6px;
}
.btn-share:hover { border-color: var(--border-hover); color: var(--text); }

.warning-banner {
  background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2);
  border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
  font-size: 12px; color: var(--yellow); display: none;
}
.warning-banner.show { display: block; }

.notes-panel {
  background: rgba(99,102,241,0.05); border: 1px solid rgba(99,102,241,0.1);
  border-radius: 12px; padding: 16px; margin-top: 16px;
}
.notes-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.note-item { font-size: 12px; color: var(--dim); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
.note-item::before { content: "•"; color: var(--accent); flex-shrink: 0; }

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  .config-cards { grid-template-columns: 1fr; }
  .deals-grid { grid-template-columns: 1fr; }
  .edit-row { grid-template-columns: 1fr; gap: 6px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PC Builder</h1>
    <p>输入预算和需求，获取最优硬件配置方案</p>
  </div>

  <div class="panel">
    <div class="panel-title">💰 预算设置</div>
    <div class="form-group">
      <label>预算范围（元）</label>
      <input type="range" id="budgetRange" min="3000" max="50000" step="500" value="8000">
      <div class="budget-display" id="budgetDisplay">¥8,000</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">🎮 主要用途</div>
    <div class="btn-group" id="useCaseGroup">
      <button class="btn-option active" data-value="gaming">游戏</button>
      <button class="btn-option" data-value="content">内容创作</button>
      <button class="btn-option" data-value="office">办公学习</button>
      <button class="btn-option" data-value="mixed">全能混合</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">🖥️ 显示器刷新率</div>
    <div class="form-group">
      <label>选择显示器刷新率（影响FPS目标）</label>
      <div class="refresh-rate-selector">
        <button class="refresh-btn" data-hz="60">60Hz</button>
        <button class="refresh-btn active" data-hz="144">144Hz</button>
        <button class="refresh-btn" data-hz="240">240Hz</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">⚙️ 其他偏好</div>
    <div class="form-grid">
      <div class="form-group">
        <label>品牌偏好</label>
        <div class="btn-group" id="brandGroup">
          <button class="btn-option active" data-value="any">不限</button>
          <button class="btn-option" data-value="amd">AMD</button>
          <button class="btn-option" data-value="intel">Intel</button>
        </div>
      </div>
      <div class="form-group">
        <label>机箱尺寸</label>
        <div class="btn-group" id="caseGroup">
          <button class="btn-option active" data-value="atx">ATX</button>
          <button class="btn-option" data-value="matx">M-ATX</button>
          <button class="btn-option" data-value="itx">ITX</button>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-primary" id="generateBtn">✨ 生成配置方案</button>

  <div class="results" id="results">
    <div class="warning-banner" id="budgetWarning">
      ⚠️ 预算可能不足，已自动调整部分配件选择
    </div>

    <div class="config-cards" id="configCards"></div>

    <div class="panel" id="fpsPanel" style="display:none;">
      <div class="panel-title">📊 预期游戏帧率</div>
      <table class="fps-table">
        <thead>
          <tr><th>游戏</th><th>1080p</th><th>1440p</th><th>4K</th></tr>
        </thead>
        <tbody id="fpsBody"></tbody>
      </table>
    </div>

    <div class="panel" id="dealsPanel">
      <div class="panel-title">🛒 各平台价格对比</div>
      <div class="deals-grid" id="dealsGrid"></div>
    </div>

    <div class="notes-panel" id="notesPanel">
      <div class="notes-title">📝 配置说明</div>
      <div id="notesContent"></div>
    </div>

    <div class="share-bar">
      <button class="btn-share" id="copyBtn">📋 复制配置</button>
      <button class="btn-share" id="editBtn">✏️ 自定义修改</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="edit-modal" id="editModal">
  <div class="edit-content">
    <div class="edit-header">
      <h3>自定义配置</h3>
      <button class="edit-close" id="editClose">×</button>
    </div>
    <div id="editForm"></div>
    <div class="edit-actions">
      <button class="btn-reset" id="editReset">重置默认</button>
      <button class="btn-save" id="editSave">保存修改</button>
    </div>
  </div>
</div>

// 状态

  useCase: 'gaming',
  brand: 'any',
  caseSize: 'atx',
  refreshRate: 144,
  selectedConfig: null,
  configs: [],

// 工具函数
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);
const fmt = n => '¥' + n.toLocaleString();

// 初始化事件
document.addEventListener('DOMContentLoaded', () => {
  // 预算滑块
  $('budgetRange').addEventListener('input', e => {
    state.budget = parseInt(e.target.value);
    $('budgetDisplay').textContent = fmt(state.budget);
  });

  // 用途选择
  $('useCaseGroup').addEventListener('click', e => {
    const btn = e.target.closest('.btn-option');
    if (!btn) return;
    $$('#useCaseGroup .btn-option').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.useCase = btn.dataset.value;
  });

  // 品牌偏好
  $('brandGroup').addEventListener('click', e => {
    const btn = e.target.closest('.btn-option');
    if (!btn) return;
    $$('#brandGroup .btn-option').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.brand = btn.dataset.value;
  });

  // 机箱尺寸
  $('caseGroup').addEventListener('click', e => {
    const btn = e.target.closest('.btn-option');
    if (!btn) return;
    $$('#caseGroup .btn-option').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.caseSize = btn.dataset.value;
  });

  // 刷新率选择
  $$('.refresh-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.refresh-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.refreshRate = parseInt(btn.dataset.hz);
    });
  });

  // 生成按钮
  $('generateBtn').addEventListener('click', generateConfigs);

  // 编辑弹窗
  $('editBtn').addEventListener('click', openEditModal);
  $('editClose').addEventListener('click', closeEditModal);
  $('editReset').addEventListener('click', resetConfig);
  $('editSave').addEventListener('click', saveConfig);
  $('editModal').addEventListener('click', e => {
    if (e.target === $('editModal')) closeEditModal();
  });

  // 复制按钮
  $('copyBtn').addEventListener('click', copyConfig);
});

function generateConfigs() {
  const budget = state.budget;
  const tier = budget < 6000 ? 'budget' : budget < 15000 ? 'mid' : 'high';

  // 生成三个方案
  const configs = [
    generateSingleConfig(budget * 0.85, 'budget', '性价比方案'),
    generateSingleConfig(budget, tier, '均衡方案'),
    generateSingleConfig(budget * 1.15, 'high', '性能方案')
  ];

  state.configs = configs;
  state.selectedConfig = 0;

  // 显示结果
  renderConfigs(configs);
  renderFPS(configs[1]);
  renderDeals(configs[1]);
  renderNotes(configs[1]);

  $('results').classList.add('show');

  // 滚动到结果
  $('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generateSingleConfig(targetBudget, tier, name) {
  const db = tier === 'budget' ? 'budget' : tier === 'mid' ? 'mid' : 'high';

  // 根据品牌偏好过滤CPU
  let cpuList = DB.cpu[db];
  if (state.brand !== 'any') {
    cpuList = cpuList.filter(c => c.brand === state.brand);
  }
  if (cpuList.length === 0) cpuList = DB.cpu[db];

  const cpu = cpuList[Math.floor(Math.random() * cpuList.length)];
  const gpu = DB.gpu[db][Math.floor(Math.random() * DB.gpu[db].length)];
  const ram = DB.ram[db][Math.floor(Math.random() * DB.ram[db].length)];
  const ssd = DB.ssd[db][Math.floor(Math.random() * DB.ssd[db].length)];
  const mb = DB.motherboard[db][Math.floor(Math.random() * DB.motherboard[db].length)];
  const psu = DB.psu[db][Math.floor(Math.random() * DB.psu[db].length)];
  const caseFan = DB.case[db][Math.floor(Math.random() * DB.case[db].length)];
  const cooler = DB.cooler[db][Math.floor(Math.random() * DB.cooler[db].length)];

  const total = cpu.price + gpu.price + ram.price + ssd.price + mb.price + psu.price + caseFan.price + cooler.price;

  return {
    name,
    tier: db,
    total,
    components: {
      cpu: { type: 'CPU', ...cpu },
      gpu: { type: '显卡', ...gpu },
      ram: { type: '内存', ...ram },
      ssd: { type: '硬盘', ...ssd },
      mb: { type: '主板', ...mb },
      psu: { type: '电源', ...psu },
      case: { type: '机箱', ...caseFan },
      cooler: { type: '散热', ...cooler }
    }
  };
}

function renderConfigs(configs) {
  const container = $('configCards');
  container.innerHTML = '';

  configs.forEach((config, idx) => {
    const tagClass = idx === 0 ? 'tag-budget' : idx === 1 ? 'tag-balanced' : 'tag-performance';
    const tagText = idx === 0 ? '💰 性价比' : idx === 1 ? '⚖️ 均衡' : '🚀 性能';

    const card = document.createElement('div');
    card.className = `config-card ${idx === state.selectedConfig ? 'selected' : ''}`;
    card.dataset.idx = idx;
    card.innerHTML = `
      <div class="config-tag ${tagClass}">${tagText}</div>
      <div class="config-total"><span class="currency">¥</span>${config.total.toLocaleString()}</div>
      <div class="config-desc">${config.name}</div>
      <div class="component-list">
        ${Object.values(config.components).map(c => `
          <div class="comp-row">
            <span class="comp-type">${c.type}</span>
            <span class="comp-name">${c.name}</span>
            <span class="comp-price">${fmt(c.price)}</span>
          </div>
        `).join('')}
      </div>
    `;

    card.addEventListener('click', () => {
      state.selectedConfig = idx;
      $$('.config-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      renderFPS(config);
      renderDeals(config);
      renderNotes(config);
    });

    container.appendChild(card);
  });
}

function renderFPS(config) {
  const tier = config.tier;
  const tierIdx = tier === 'budget' ? 0 : tier === 'mid' ? 1 : 2;
  const games = FPS_DATA[state.useCase];
  const tbody = $('fpsBody');
  tbody.innerHTML = '';

  let hasData = false;

  Object.entries(games).forEach(([game, data]) => {
    if (typeof data[tier] === 'string') {
      // 非游戏应用
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${game}</td>
        <td colspan="3" class="fps-value fps-high">${data[tier]}</td>
      `;
      tbody.appendChild(row);
      hasData = true;
    } else {
      // 游戏帧率
      const [f1080, f1440, f4k] = data[tier];
      const target = state.refreshRate;

      const getClass = fps => fps >= target ? 'fps-high' : fps >= target * 0.7 ? 'fps-medium' : 'fps-low';

      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${game}</td>
        <td class="fps-value ${getClass(f1080)}">${f1080} FPS</td>
        <td class="fps-value ${getClass(f1440)}">${f1440} FPS</td>
        <td class="fps-value ${getClass(f4k)}">${f4k} FPS</td>
      `;
      tbody.appendChild(row);
      hasData = true;
    }
  });

  $('fpsPanel').style.display = hasData ? 'block' : 'none';
}

function renderDeals(config) {
  const grid = $('dealsGrid');
  grid.innerHTML = '';

  // 模拟各平台价格（基于配置总价）
  const basePrice = config.total;
  const deals = PLATFORMS.map((platform, idx) => {
    // 模拟价格浮动
    const variation = [0, 0.98, 0.93, 0.96][idx]; // 京东原价，天猫98折，拼多多93折，淘宝96折
    const price = Math.round(basePrice * variation);
    return { ...platform, price, isBest: idx === 2 }; // 拼多多最便宜
  });

  // 排序找最低价
  const minPrice = Math.min(...deals.map(d => d.price));

  deals.forEach(deal => {
    const card = document.createElement('div');
    card.className = 'deal-card';
    card.innerHTML = `
      <div class="deal-platform">${deal.icon} ${deal.name}</div>
      <div class="deal-price ${deal.price === minPrice ? 'best' : ''}">${fmt(deal.price)}</div>
      <a href="#" class="deal-link" onclick="event.preventDefault(); alert('跳转到${deal.name}搜索页');">去看看 →</a>
    `;
    grid.appendChild(card);
  });
}

function renderNotes(config) {
  const content = $('notesContent');
  const tier = config.tier;
  const notes = [];

  // 根据配置生成说明
  if (tier === 'budget') {
    notes.push('性价比方案，适合预算有限的用户');
    notes.push('建议后续根据需求升级显卡或内存');
  } else if (tier === 'mid') {
    notes.push('均衡配置，满足大多数使用场景');
    notes.push('预留了一定的升级空间');
  } else {
    notes.push('高性能配置，适合追求极致体验的用户');
    notes.push('建议搭配高刷新率显示器使用');
  }

  // 根据用途添加说明
  if (state.useCase === 'gaming') {
    notes.push(`显示器刷新率: ${state.refreshRate}Hz，帧率目标已据此调整`);
    if (state.refreshRate >= 144) {
      notes.push('建议开启显卡的自适应同步技术（G-Sync/FreeSync）');
    }
  } else if (state.useCase === 'content') {
    notes.push('内容创作建议选择大内存和高速SSD');
    notes.push('视频剪辑建议搭配校色显示器');
  }

  // 品牌偏好说明
  if (state.brand !== 'any') {
    notes.push(`已按品牌偏好筛选: ${state.brand.toUpperCase()}`);
  }

  content.innerHTML = notes.map(n => `<div class="note-item">${n}</div>`).join('');
}

function openEditModal() {
  if (state.selectedConfig === null) return;

  const config = state.customConfig || state.configs[state.selectedConfig];
  const form = $('editForm');
  form.innerHTML = '';

  Object.entries(config.components).forEach(([key, comp]) => {
    const row = document.createElement('div');
    row.className = 'edit-row';
    row.innerHTML = `
      <div class="edit-label">${comp.type}</div>
      <select class="edit-select" data-key="${key}">
        ${getComponentOptions(key, comp.name)}
      </select>
      <div class="edit-price">${fmt(comp.price)}</div>
    `;
    form.appendChild(row);
  });

  // 更新价格监听
  form.querySelectorAll('.edit-select').forEach(select => {
    select.addEventListener('change', () => {
      updateEditPrices();
    });
  });

  $('editModal').classList.add('show');
}

function getComponentOptions(key, currentName) {
  const dbKey = key === 'case' ? 'case' : key;
  const tiers = ['budget', 'mid', 'high'];
  let options = [];

  tiers.forEach(tier => {
    if (DB[dbKey] && DB[dbKey][tier]) {
      DB[dbKey][tier].forEach(item => {
        const selected = item.name === currentName ? 'selected' : '';
        options.push(`<option value="${item.name}" data-price="${item.price}" ${selected}>${item.name} - ${fmt(item.price)}</option>`);
      });
    }
  });

  return options.join('');
}

function updateEditPrices() {
  const rows = document.querySelectorAll('.edit-row');
  let total = 0;

  rows.forEach(row => {
    const select = row.querySelector('.edit-select');
    const priceDisplay = row.querySelector('.edit-price');
    const selectedOption = select.options[select.selectedIndex];
    const price = parseInt(selectedOption.dataset.price);
    priceDisplay.textContent = fmt(price);
    total += price;
  });

  // 可以在这里更新总价显示
}

function closeEditModal() {
  $('editModal').classList.remove('show');
}

function resetConfig() {
  state.customConfig = null;
  openEditModal(); // 重新打开使用默认配置
}

function saveConfig() {
  const config = state.configs[state.selectedConfig];
  const newConfig = { ...config, components: {} };

  document.querySelectorAll('.edit-row').forEach(row => {
    const key = row.querySelector('.edit-select').dataset.key;
    const select = row.querySelector('.edit-select');
    const selectedOption = select.options[select.selectedIndex];
    const price = parseInt(selectedOption.dataset.price);

    newConfig.components[key] = {
      ...config.components[key],
      name: selectedOption.value,
      price
    };
  });

  // 重新计算总价
  newConfig.total = Object.values(newConfig.components).reduce((sum, c) => sum + c.price, 0);
  newConfig.name = '自定义配置';

  state.customConfig = newConfig;

  // 更新显示
  renderConfigs([newConfig]);
  renderFPS(newConfig);
  renderDeals(newConfig);
  renderNotes(newConfig);

  closeEditModal();

  // 提示
  alert('配置已更新！');
}

function copyConfig() {
  const config = state.customConfig || state.configs[state.selectedConfig];
  let text = `🎮 PC Builder 配置方案\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `方案: ${config.name}\n`;
  text += `总价: ${fmt(config.total)}\n\n`;
  text += `硬件清单:\n`;

  Object.values(config.components).forEach(comp => {
    text += `${comp.type}: ${comp.name} ${fmt(comp.price)}\n`;
  });

  text += `\n━━━━━━━━━━━━━━━━━━━━\n`;
  text += `显示器: ${state.refreshRate}Hz | 用途: ${state.useCase}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = $('copyBtn');
    btn.textContent = '✅ 已复制';
    setTimeout(() => {
      btn.textContent = '📋 复制配置';
    }, 2000);
  }).catch(() => {
    // Fallback
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('配置已复制到剪贴板！');
  });
}
</script>
