<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LiHongwei - 新能源汽车工程 · MATLAB 仿真 · AI 工具开发 · GitHub 热点追踪">
<title>LiHongwei</title>
<style>
:root{
  --bg: #12121a;
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e4e4e7;
  --dim: rgba(255,255,255,0.4);
  --accent: #818cf8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 48px 24px;
  overflow-x: hidden;
}
body::before{
  content: '';
  position: fixed; top: -40%; left: -20%; width: 140%; height: 140%;
  background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.container{width: 100%; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1;}

.header{text-align: center; margin-bottom: 36px;}
.avatar{width: 72px; height: 72px; border-radius: 50%; display: block; margin: 0 auto 12px; object-fit: cover;}
.name{font-size: 20px; font-weight: 700; letter-spacing: -0.3px;}
.subtitle{font-size: 12px; color: var(--dim); margin-top: 4px;}

/* 自适应仪表盘 — 列数随窗口宽度自动调节 */
.dashboard{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
  margin-bottom: 32px;
}

.cat-section{
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 16px;
  transition: border-color 0.2s;
}
.cat-section:hover{border-color: var(--border-hover);}

.cat-label{
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.nav-grid{display: flex; flex-direction: column; gap: 6px;}

.card{
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 12px;
  text-decoration: none; color: inherit;
  transition: all 0.15s ease; cursor: pointer; position: relative;
}
.card:hover{background: var(--card-hover); border-color: var(--border-hover);}

.card-icon{
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.card-body{flex: 1; min-width: 0;}
.card-title{font-size: 13px; font-weight: 600; margin-bottom: 1px; letter-spacing: -0.2px;}
.card-desc{font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

.card-arrow{display: none;}

/* 访问量标记 */
.card-views{
  position: absolute; top: 4px; right: 8px;
  font-size: 9px; color: rgba(255,255,255,0.1);
}

.footer{
  text-align: center; font-size: 12px;
  color: rgba(255,255,255,0.15);
}
.footer a{color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s;}
.footer a:hover{color: rgba(255,255,255,0.4);}
.footer .stats-note{font-size: 10px; margin-bottom: 4px;}
.page-counter{font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 6px;}

/* —— 响应式 —— */
@media(max-width: 540px){
  .dashboard{grid-template-columns: 1fr; gap: 12px;}
  body{padding: 28px 14px;}
  .header{margin-bottom: 24px;}
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <img class="avatar" src="avatar.jpg" alt="LiHongwei" />
    <div class="name">LiHongwei</div>
  </div>

  <div class="dashboard">

    <!-- 工具类 -->
    <div class="cat-section" data-cat="tools">
      <div class="cat-label">🛠️ 工具</div>
      <div class="nav-grid">

        <a class="card" href="matlab-tool/" data-id="matlab-tool">
          <div class="card-icon" style="background:linear-gradient(135deg,#0e7490,#0369a1)">⚡</div>
          <div class="card-body">
            <div class="card-title">MATLAB AI 仿真工具包</div>
            <div class="card-desc">AI 生成代码 · 车辆动力学 · 电机控制</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

        <a class="card" href="desktop-launcher/" data-id="desktop-launcher">
          <div class="card-icon" style="background:linear-gradient(135deg,#059669,#047857)">⚡</div>
          <div class="card-body">
            <div class="card-title">Claude Code 桌面启动</div>
            <div class="card-desc">Win / Mac 一键创建桌面快捷方式</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

      </div>
    </div>

    <!-- 教程类 -->
    <div class="cat-section" data-cat="tutorials">
      <div class="cat-label">📚 教程</div>
      <div class="nav-grid">

        <a class="card" href="claude-code-tutorial/" data-id="claude-code-tutorial">
          <div class="card-icon" style="background:linear-gradient(135deg,#6d28d9,#5b21b6)">🦀</div>
          <div class="card-body">
            <div class="card-title">Claude Code 完整指南</div>
            <div class="card-desc">安装 · 国产模型 · 全局规范 · Skill</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

        <a class="card" href="vpn-guide/" data-id="vpn-guide">
          <div class="card-icon" style="background:linear-gradient(135deg,#b91c1c,#991b1b)">🔒</div>
          <div class="card-body">
            <div class="card-title">免费 VPN 自建指南</div>
            <div class="card-desc">Cloudflare 零成本 · 全平台客户端</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

      </div>
    </div>

    <!-- 优化类 -->
    <div class="cat-section" data-cat="optimize">
      <div class="cat-label">⚡ 优化</div>
      <div class="nav-grid">

        <a class="card" href="win-optimize/" data-id="win-optimize">
          <div class="card-icon" style="background:linear-gradient(135deg,#0e7490,#155e75)">🖥️</div>
          <div class="card-body">
            <div class="card-title">Win / Mac 系统优化</div>
            <div class="card-desc">一行命令瘦身 · 隐私保护</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

      </div>
    </div>

    <!-- 信息热点类 -->
    <div class="cat-section" data-cat="trending">
      <div class="cat-label">🔥 热点</div>
      <div class="nav-grid">

        <a class="card" href="github-trending/" data-id="github-trending">
          <div class="card-icon" style="background:linear-gradient(135deg,#f97316,#dc2626)">🔥</div>
          <div class="card-body">
            <div class="card-title">GitHub 每日热点</div>
            <div class="card-desc">中英文区 · 自动翻译 · 每日更新</div>
          </div>
          <span class="card-views" data-views="..."></span>
        </a>

      </div>
    </div>

  </div>

  <div class="footer">
    <div class="stats-note">📊 项目按访问量排列</div>
    <div class="page-counter" id="counter">...</div>
    <a href="https://github.com/LiHongwei-cn/lihongwei-cn">GitHub ↗</a>
  </div>

  <!-- 计数器：递增 -->
  <img src="https://api.counterapi.dev/v1/lihongwei-cn/home/up" style="display:none" alt="" />

</div>

<script>
(async function(){
  const STATS_URL = 'https://raw.githubusercontent.com/LiHongwei-cn/lihongwei-cn/main/stats.json';

  let stats = {};
  try {
    let r = await fetch(STATS_URL + '?t=' + Date.now());
    stats = await r.json();
  } catch(e) {}

  // 页面总访问量（从 stats.json 读取，避免 CORS 拦截）
  document.getElementById('counter').textContent = '👁 ' + (stats.home || 0) + ' 次访问';

  document.querySelectorAll('.cat-section').forEach(section => {
    let cards = Array.from(section.querySelectorAll('.card'));

    cards.forEach(card => {
      let id = card.dataset.id;
      let count = stats[id];
      card.querySelector('.card-views').textContent = count ? count + ' 次' : '';
    });

    cards.sort((a, b) => {
      let va = stats[a.dataset.id] || 0;
      let vb = stats[b.dataset.id] || 0;
      return vb - va;
    });

    let grid = section.querySelector('.nav-grid');
    cards.forEach(c => grid.appendChild(c));
  });
})();
</script>
</body>
</html>
