<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiHongwei</title>
<style>
:root{
  --bg: #09090b;
  --card: rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e4e4e7;
  --dim: rgba(255,255,255,0.4);
  --accent: #818cf8;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}

body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* subtle background glow */
body::before{
  content: '';
  position: fixed;
  top: -40%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container{
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
}

/* header */
.header{
  text-align: center;
  margin-bottom: 36px;
}

.avatar-wrap{
  position: relative;
  display: inline-block;
  margin-bottom: 14px;
}

.avatar-wrap::after{
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
}

.avatar{
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: block;
  object-fit: cover;
}

.name{
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

/* nav */
.nav-grid{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card{
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.card::before{
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 0 2px 2px 0;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.card:nth-child(1)::before{ background: linear-gradient(180deg, #00b4db, #0083b0); }
.card:nth-child(2)::before{ background: linear-gradient(180deg, #f87171, #fb923c); }
.card:nth-child(3)::before{ background: linear-gradient(180deg, #22d3ee, #6366f1); }
.card:nth-child(4)::before{ background: linear-gradient(180deg, #a78bfa, #818cf8); }

.card:hover{
  background: var(--card-hover);
  border-color: var(--border-hover);
  transform: translateX(4px);
}

.card:hover::before{ opacity: 1; }

.card-icon{
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.card-body{ flex: 1; min-width: 0; }

.card-title{
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 3px;
  letter-spacing: -0.2px;
}

.card-desc{
  font-size: 12px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-arrow{
  color: rgba(255,255,255,0.15);
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.card:hover .card-arrow{
  color: rgba(255,255,255,0.35);
  transform: translateX(2px);
}

/* footer */
.footer{
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
}

.footer a{
  color: rgba(255,255,255,0.18);
  text-decoration: none;
  transition: color 0.2s;
}
.footer a:hover{ color: rgba(255,255,255,0.35); }

@media(max-width: 400px){
  .card{ padding: 14px 16px; gap: 12px; }
  .card-icon{ width: 36px; height: 36px; font-size: 16px; }
  .avatar{ width: 56px; height: 56px; }
}
</style>
</head>
<body>

<div class="container">

  <div class="nav-grid">

      <div class="card-body">

        <div class="card-desc">AI 生成代码 · 车辆动力学 · 电机控制 · 一键运行</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="vpn-guide/">
      <div class="card-icon" style="background:linear-gradient(135deg,#f87171,#fb923c)">🔒</div>
      <div class="card-body">

        <div class="card-desc">Cloudflare 零成本搭建 · 全平台客户端 · 无需技术背景</div>

    </a>

    <a class="card" href="win-optimize/">

      <div class="card-body">
        <div class="card-title">Windows 系统优化教程</div>
        <div class="card-desc">一行命令瘦身 · 纯净安装盘制作 · 隐私保护</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="claude-code-tutorial/">
      <div class="card-icon" style="background:linear-gradient(135deg,#a78bfa,#818cf8)">🦀</div>
      <div class="card-body">
        <div class="card-title">Claude Code 从零入门教程</div>
        <div class="card-desc">Win/Mac 安装 · 国产模型接入 · Telegram 机器人</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <a href="https://github.com/LiHongwei-ch">GitHub ↗</a>
  </div>

</div>
</body>
</html>
