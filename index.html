<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiHongwei · 主页</title>
<style>
:root{--bg:#0f0c29;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);--text:#e8e8e8;--dim:rgba(255,255,255,0.45);--accent:#6c8cff}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:480px}

/* header */
.header{text-align:center;margin-bottom:32px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#6c8cff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;color:#fff;font-weight:600}
.name{font-size:20px;font-weight:700;margin-bottom:4px}
.bio{font-size:13px;color:var(--dim);line-height:1.6}

/* nav cards */
.nav-grid{display:flex;flex-direction:column;gap:12px}
.card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;text-decoration:none;color:inherit;transition:all 0.25s ease;cursor:pointer}
.card:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);transform:translateY(-2px)}
.card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-icon.vote{background:linear-gradient(135deg,#ff416c,#ff4b2b)}
.card-icon.tool{background:linear-gradient(135deg,#00b4db,#0083b0)}
.card-icon.file{background:linear-gradient(135deg,#f6d365,#fda085)}
.card-icon.link{background:linear-gradient(135deg,#a78bfa,#6c8cff)}
.card-icon.vpn{background:linear-gradient(135deg,#f87171,#fb923c)}
.card-body{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;margin-bottom:2px}
.card-desc{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-arrow{color:var(--dim);font-size:16px;flex-shrink:0}

/* footer */
.footer{text-align:center;margin-top:40px;font-size:12px;color:rgba(255,255,255,0.2)}

@media(max-width:400px){
  .card{padding:14px 16px;gap:12px}
  .card-icon{width:36px;height:36px;font-size:16px}
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="avatar">L</div>
    <div class="name">LiHongwei</div>
    <div class="bio">新能源汽车工程 · 大三<br>MATLAB · Python · 嵌入式</div>
  </div>

  <div class="nav-grid">

    <a class="card" href="vote/">
      <div class="card-icon vote">🗳️</div>
      <div class="card-body">
        <div class="card-title">米塔投票</div>
        <div class="card-desc">每日一票 · 全民公投</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="matlab-tool/">
      <div class="card-icon tool">⚡</div>
      <div class="card-body">
        <div class="card-title">MATLAB AI 代码生成</div>
        <div class="card-desc">AI 生成仿真代码 · 笔记本一键运行 · 免费下载</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="vpn-guide/">
      <div class="card-icon vpn">🔒</div>
      <div class="card-body">
        <div class="card-title">免费 VPN 自建指南</div>
        <div class="card-desc">Cloudflare 零成本搭建 · Clash 使用 · 零度解说教程</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="win-optimize/">
      <div class="card-icon" style="background:linear-gradient(135deg,#22d3ee,#6c8cff)">🖥️</div>
      <div class="card-body">
        <div class="card-title">Windows 优化工具</div>
        <div class="card-desc">一行命令系统瘦身 · 纯净安装盘制作 · WinHance</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <a href="https://github.com/LiHongwei-ch" style="color:rgba(255,255,255,0.3);text-decoration:none">GitHub ↗</a>
  </div>

</div>
</body>
</html>
