<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiHongwei</title>
<style>
:root{
  --bg: #f8f7f4;
  --card: #ffffff;
  --card-hover: #fafaf9;
  --border: rgba(0,0,0,0.06);
  --border-hover: rgba(0,0,0,0.12);
  --text: #1c1c1e;
  --dim: rgba(0,0,0,0.45);
  --accent: #6366f1;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}

body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container{
  width: 100%;
  max-width: 420px;
}

/* header */
.header{
  text-align: center;
  margin-bottom: 32px;
}

.avatar{
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: block;
  margin: 0 auto 12px;
  object-fit: cover;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.name{
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

/* nav */
.nav-grid{
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card{
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s ease;
  cursor: pointer;
  box-shadow: var(--shadow);
}

.card:hover{
  background: var(--card-hover);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}

.card-icon{
  width: 42px;
  height: 42px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
}

.card-body{ flex: 1; min-width: 0; }

.card-title{
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 3px;
  letter-spacing: -0.2px;
}

.card-desc{
  font-size: 13px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-arrow{
  color: rgba(0,0,0,0.15);
  font-size: 15px;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.card:hover .card-arrow{
  color: rgba(0,0,0,0.3);
  transform: translateX(2px);
}

/* footer */
.footer{
  text-align: center;
  margin-top: 36px;
  font-size: 13px;
}

.footer a{
  color: rgba(0,0,0,0.25);
  text-decoration: none;
  transition: color 0.2s;
}
.footer a:hover{ color: rgba(0,0,0,0.45); }

@media(max-width: 400px){
  .card{ padding: 14px 16px; gap: 12px; }
  .card-icon{ width: 38px; height: 38px; font-size: 17px; }
  .avatar{ width: 60px; height: 60px; }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <img class="avatar" src="avatar.jpg" alt="LiHongwei" />
    <div class="name">LiHongwei</div>
  </div>

  <div class="nav-grid">

    <a class="card" href="matlab-tool/">
      <div class="card-icon" style="background:linear-gradient(135deg,#e0f2fe,#bae6fd);color:#0369a1">⚡</div>
      <div class="card-body">
        <div class="card-title">MATLAB AI 仿真工具包</div>
        <div class="card-desc">AI 生成代码 · 车辆动力学 · 电机控制 · 一键运行</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="vpn-guide/">
      <div class="card-icon" style="background:linear-gradient(135deg,#fee2e2,#fecaca);color:#b91c1c">🔒</div>
      <div class="card-body">
        <div class="card-title">免费 VPN 自建指南</div>
        <div class="card-desc">Cloudflare 零成本搭建 · 全平台客户端 · 无需技术背景</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="win-optimize/">
      <div class="card-icon" style="background:linear-gradient(135deg,#cffafe,#a5f3fc);color:#0e7490">🖥️</div>
      <div class="card-body">
        <div class="card-title">Windows 系统优化教程</div>
        <div class="card-desc">一行命令瘦身 · 纯净安装盘制作 · 隐私保护</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="claude-code-tutorial/">
      <div class="card-icon" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#6d28d9">🦀</div>
      <div class="card-body">
        <div class="card-title">Claude Code 从零入门教程</div>
        <div class="card-desc">Win/Mac 安装 · 国产模型接入 · Telegram 机器人</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <a href="https://github.com/LiHongwei-ch">GitHub ↗</a>
  </div>

</div>
</body>
</html>
