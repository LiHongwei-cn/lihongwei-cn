<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历投递系统</title>
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e8e8ed;
  --dim: rgba(255,255,255,0.45);
  --accent: #6c8cff;
  --accent-dim: rgba(108,140,255,0.15);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --yellow: #fbbf24;
  --red: #f87171;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--accent); text-decoration:none; }

/* 布局 */
.app { display:flex; height:100vh; }
.sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); padding:20px 0; flex-shrink:0; display:flex; flex-direction:column; }
.sidebar-logo { padding:0 20px 24px; font-size:18px; font-weight:700; color:var(--accent); letter-spacing:-0.5px; }
.sidebar-nav { flex:1; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; color:var(--dim); font-size:14px; transition:all 0.15s; border-left:3px solid transparent; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { color:var(--accent); background:var(--accent-dim); border-left-color:var(--accent); }
.nav-icon { width:18px; text-align:center; }
.main { flex:1; overflow-y:auto; padding:28px 32px; }
.page-title { font-size:22px; font-weight:700; margin-bottom:24px; letter-spacing:-0.3px; }

/* 表单 */
.form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:24px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
.form-label { font-size:12px; color:var(--dim); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.form-input, .form-textarea, .form-select { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.15s; }
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--accent); }
.form-textarea { resize:vertical; min-height:80px; }
.form-select { cursor:pointer; }

/* 按钮 */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:var(--radius); font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all 0.15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { opacity:0.85; }
.btn-success { background:var(--green); color:#000; }
.btn-danger { background:var(--red); color:#fff; }
.btn-ghost { background:transparent; color:var(--dim); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--border-hover); color:var(--text); }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }

/* 卡片 */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; transition:border-color 0.15s; }
.card:hover { border-color:var(--border-hover); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.card-title { font-size:15px; font-weight:600; }
.card-subtitle { font-size:12px; color:var(--dim); margin-top:2px; }

/* 表格 */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; color:var(--dim); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
td { padding:10px 12px; border-bottom:1px solid var(--border); }
tr:hover td { background:var(--surface2); }

/* 标签 */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
.badge-pending { background:rgba(251,191,36,0.12); color:var(--yellow); }
.badge-applied { background:var(--green-dim); color:var(--green); }
.badge-rejected { background:rgba(248,113,113,0.12); color:var(--red); }
.badge-interview { background:var(--accent-dim); color:var(--accent); }

/* 空状态 */
.empty { text-align:center; padding:60px 20px; color:var(--dim); }
.empty-icon { font-size:40px; margin-bottom:12px; opacity:0.5; }
.empty-text { font-size:14px; }

/* 模态框 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:90%; max-width:560px; max-height:80vh; overflow-y:auto; padding:24px; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }

/* 页面切换 */
.page { display:none; }
.page.active { display:block; }

/* 岗位筛选 */
.filter-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.filter-input { flex:1; min-width:200px; }

/* 投递统计 */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-num { font-size:28px; font-weight:700; }
.stat-label { font-size:12px; color:var(--dim); margin-top:4px; }
</style>
</head>
<body>
<div class="app">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-logo">📋 简历投递</div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="profile"><span class="nav-icon">👤</span>个人信息</div>
      <div class="nav-item" data-page="experience"><span class="nav-icon">📁</span>经历管理</div>
      <div class="nav-item" data-page="companies"><span class="nav-icon">🏢</span>目标公司</div>
      <div class="nav-item" data-page="positions"><span class="nav-icon">💼</span>岗位列表</div>
      <div class="nav-item" data-page="apply"><span class="nav-icon">🚀</span>一键投递</div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">

    <!-- 个人信息页 -->
    <div class="page active" id="page-profile">
      <div class="page-title">个人信息</div>
      <div id="profile-form"></div>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="saveProfile()">💾 保存</button>
      </div>
    </div>

    <!-- 经历管理页 -->
    <div class="page" id="page-experience">
      <div class="page-title">经历管理</div>
      <div class="btn-group" style="margin-bottom:20px">
        <button class="btn btn-ghost" onclick="showExpTab('education')">🎓 教育经历</button>
        <button class="btn btn-ghost" onclick="showExpTab('projects')">🚀 项目经历</button>
        <button class="btn btn-ghost" onclick="showExpTab('work_experience')">💼 工作经历</button>
        <button class="btn btn-ghost" onclick="showExpTab('awards')">🏆 奖项荣誉</button>
        <button class="btn btn-ghost" onclick="showExpTab('certificates')">📜 证书资质</button>
        <button class="btn btn-ghost" onclick="showExpTab('organizations')">🏛️ 社团组织</button>
        <button class="btn btn-ghost" onclick="showExpTab('publications')">📄 论文专利</button>
        <button class="btn btn-ghost" onclick="showExpTab('volunteer')">❤️ 志愿服务</button>
      </div>
      <div id="exp-content"></div>
    </div>

    <!-- 目标公司页 -->
    <div class="page" id="page-companies">
      <div class="page-title">目标公司</div>
      <button class="btn btn-primary" onclick="showCompanyModal()" style="margin-bottom:20px">+ 添加公司</button>
      <div id="companies-list"></div>
    </div>

    <!-- 岗位列表页 -->
    <div class="page" id="page-positions">
      <div class="page-title">岗位列表</div>
      <div class="filter-bar">
        <input class="form-input filter-input" id="pos-filter" placeholder="搜索岗位/公司..." oninput="filterPositions()">
        <select class="form-select" id="pos-status-filter" onchange="filterPositions()">
          <option value="">全部状态</option>
          <option value="pending">待投递</option>
          <option value="applied">已投递</option>
          <option value="interview">面试中</option>
          <option value="rejected">已拒绝</option>
        </select>
      </div>
      <div id="positions-list"></div>
    </div>

    <!-- 一键投递页 -->
    <div class="page" id="page-apply">
      <div class="page-title">一键投递</div>
      <div class="stats" id="apply-stats"></div>
      <div class="card" style="margin-bottom:20px">
        <div style="font-size:14px;color:var(--dim);margin-bottom:12px">选择要投递的岗位，系统将自动打开浏览器填写表单，填写完成后暂停等待你确认再提交。</div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="startApply()">🚀 开始投递</button>
        </div>
      </div>
      <div id="apply-positions"></div>
    </div>

  </div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-confirm">确认</button>
    </div>
  </div>
</div>

<script>
const API = '';

// ═══ 导航 ═══
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('page-' + item.dataset.page).classList.add('active');
    loadPage(item.dataset.page);
  });
});

function loadPage(page) {
  if (page === 'profile') loadProfile();
  else if (page === 'experience') showExpTab('education');
  else if (page === 'companies') loadCompanies();
  else if (page === 'positions') loadPositions();
  else if (page === 'apply') loadApply();
}

// ═══ 个人信息 ═══
const PROFILE_FIELDS = [
  {section:'基本信息', fields:[
    {key:'name',label:'姓名',required:true},{key:'gender',label:'性别',type:'select',options:['男','女']},
    {key:'birth_date',label:'出生日期',type:'date'},{key:'ethnicity',label:'民族'},
    {key:'political_status',label:'政治面貌',type:'select',options:['群众','共青团员','中共党员','中共预备党员']},
    {key:'phone',label:'手机号',required:true},{key:'email',label:'邮箱',required:true},
    {key:'wechat',label:'微信'},{key:'qq',label:'QQ'}
  ]},
  {section:'地址信息', fields:[
    {key:'hometown',label:'籍贯'},{key:'current_city',label:'当前城市'},
    {key:'current_address',label:'详细地址',full:true}
  ]},
  {section:'教育信息', fields:[
    {key:'university',label:'学校'},{key:'college',label:'学院'},
    {key:'major',label:'专业'},{key:'degree',label:'学历',type:'select',options:['专科','本科','硕士','博士']},
    {key:'enrollment_year',label:'入学年份'},{key:'graduation_year',label:'毕业年份'},
    {key:'gpa',label:'GPA'},{key:'ranking',label:'排名/百分比'}
  ]},
  {section:'求职意向', fields:[
    {key:'target_position',label:'目标岗位'},{key:'target_city',label:'意向城市'},
    {key:'expected_salary',label:'期望薪资'},{key:'available_date',label:'到岗时间'}
  ]},
  {section:'技能与特长', fields:[
    {key:'skills',label:'技能（JSON数组）',full:true},
    {key:'languages',label:'语言能力（JSON数组）',full:true},
    {key:'hobbies',label:'兴趣爱好（JSON数组）',full:true}
  ]},
  {section:'自我评价', fields:[
    {key:'self_intro',label:'自我评价',type:'textarea',full:true}
  ]}
];

let profileData = {};

async function loadProfile() {
  profileData = await fetch(API+'/api/profile').then(r=>r.json());
  renderProfileForm();
}

function renderProfileForm() {
  const form = document.getElementById('profile-form');
  form.innerHTML = PROFILE_FIELDS.map(sec => `
    <div style="margin-bottom:24px">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)">${sec.section}</div>
      <div class="form-grid">
        ${sec.fields.map(f => {
          const val = profileData[f.key] || '';
          const cls = f.full ? 'form-group full' : 'form-group';
          let input;
          if (f.type === 'select') {
            input = `<select class="form-select" id="pf-${f.key}"><option value="">请选择</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
          } else if (f.type === 'textarea') {
            input = `<textarea class="form-textarea" id="pf-${f.key}" rows="4">${val}</textarea>`;
          } else if (f.type === 'date') {
            input = `<input class="form-input" type="date" id="pf-${f.key}" value="${val}">`;
          } else {
            input = `<input class="form-input" id="pf-${f.key}" value="${val}" placeholder="${f.label}">`;
          }
          return `<div class="${cls}"><label class="form-label">${f.label}${f.required?' *':''}</label>${input}</div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

async function saveProfile() {
  const data = {};
  PROFILE_FIELDS.forEach(sec => sec.fields.forEach(f => {
    const el = document.getElementById('pf-' + f.key);
    if (el) data[f.key] = el.value;
  }));
  await fetch(API+'/api/profile', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  alert('已保存');
}

// ═══ 经历管理 ═══
const EXP_CONFIG = {
  education: {title:'教育经历',fields:[
    {key:'school',label:'学校',required:true},{key:'college',label:'学院'},
    {key:'major',label:'专业'},{key:'degree',label:'学历'},
    {key:'start_date',label:'开始时间'},{key:'end_date',label:'结束时间'},
    {key:'gpa',label:'GPA'},{key:'ranking',label:'排名'},{key:'courses',label:'核心课程',full:true}
  ]},
  projects: {title:'项目经历',fields:[
    {key:'name',label:'项目名称',required:true},{key:'role',label:'担任角色'},
    {key:'company',label:'所属单位'},{key:'start_date',label:'开始时间'},{key:'end_date',label:'结束时间'},
    {key:'tech_stack',label:'技术栈'},{key:'url',label:'项目链接'},
    {key:'description',label:'项目描述',type:'textarea',full:true},
    {key:'achievements',label:'主要成果',type:'textarea',full:true}
  ]},
  work_experience: {title:'工作/实习经历',fields:[
    {key:'company',label:'公司名称',required:true},{key:'position',label:'职位'},
    {key:'start_date',label:'开始时间'},{key:'end_date',label:'结束时间'},
    {key:'description',label:'工作内容',type:'textarea',full:true},
    {key:'achievements',label:'工作成果',type:'textarea',full:true}
  ]},
  awards: {title:'奖项荣誉',fields:[
    {key:'name',label:'奖项名称',required:true},{key:'level',label:'级别',type:'select',options:['校级','市级','省级','国家级','国际级']},
    {key:'issuer',label:'颁发机构'},{key:'date',label:'获得时间'},{key:'description',label:'说明',type:'textarea',full:true}
  ]},
  certificates: {title:'证书资质',fields:[
    {key:'name',label:'证书名称',required:true},{key:'issuer',label:'颁发机构'},
    {key:'date',label:'获得时间'},{key:'number',label:'证书编号'},{key:'expiry',label:'有效期至'}
  ]},
  organizations: {title:'社团/组织经历',fields:[
    {key:'name',label:'组织名称',required:true},{key:'role',label:'担任职务'},
    {key:'start_date',label:'开始时间'},{key:'end_date',label:'结束时间'},
    {key:'description',label:'工作内容',type:'textarea',full:true}
  ]},
  publications: {title:'论文/专利',fields:[
    {key:'title',label:'标题',required:true},{key:'authors',label:'作者'},
    {key:'venue',label:'发表期刊/会议'},{key:'date',label:'发表时间'},
    {key:'doi',label:'DOI'},{key:'type',label:'类型',type:'select',options:['论文','专利','软著']}
  ]},
  volunteer: {title:'志愿服务',fields:[
    {key:'organization',label:'组织名称',required:true},{key:'role',label:'担任角色'},
    {key:'start_date',label:'开始时间'},{key:'end_date',label:'结束时间'},
    {key:'hours',label:'服务时长(小时)'},{key:'description',label:'服务内容',type:'textarea',full:true}
  ]}
};

let currentExpTab = 'education';

async function showExpTab(tab) {
  currentExpTab = tab;
  const cfg = EXP_CONFIG[tab];
  const items = await fetch(API+'/api/'+tab).then(r=>r.json());
  const container = document.getElementById('exp-content');
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="font-size:16px;font-weight:600">${cfg.title}</div>
    <button class="btn btn-primary btn-sm" onclick="showExpModal('${tab}')">+ 添加</button>
  </div>`;
  if (items.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">暂无数据</div></div>`;
  } else {
    items.forEach(item => {
      const main = item.name || item.school || item.company || item.title || item.organization;
      const sub = item.role || item.position || item.degree || item.level || '';
      html += `<div class="card">
        <div class="card-header">
          <div><div class="card-title">${main}</div>${sub?`<div class="card-subtitle">${sub}</div>`:''}</div>
          <div class="btn-group">
            <button class="btn btn-ghost btn-sm" onclick="showExpModal('${tab}',${item.id})">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="deleteExp('${tab}',${item.id})">删除</button>
          </div>
        </div>
        ${item.description?`<div style="font-size:13px;color:var(--dim);line-height:1.6">${item.description}</div>`:''}
      </div>`;
    });
  }
  container.innerHTML = html;
}

function showExpModal(tab, itemId) {
  const cfg = EXP_CONFIG[tab];
  const isEdit = !!itemId;
  let item = {};
  const title = (isEdit ? '编辑' : '添加') + cfg.title;

  const render = async () => {
    if (isEdit) {
      const items = await fetch(API+'/api/'+tab).then(r=>r.json());
      item = items.find(i=>i.id===itemId) || {};
    }
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = `
      <div class="form-grid">
        ${cfg.fields.map(f => {
          const val = item[f.key] || '';
          const cls = f.full ? 'form-group full' : 'form-group';
          let input;
          if (f.type === 'select') {
            input = `<select class="form-select" id="exp-${f.key}"><option value="">请选择</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
          } else if (f.type === 'textarea') {
            input = `<textarea class="form-textarea" id="exp-${f.key}" rows="3">${val}</textarea>`;
          } else {
            input = `<input class="form-input" id="exp-${f.key}" value="${val}" placeholder="${f.label}">`;
          }
          return `<div class="${cls}"><label class="form-label">${f.label}${f.required?' *':''}</label>${input}</div>`;
        }).join('')}
      </div>`;
    document.getElementById('modal-confirm').onclick = async () => {
      const data = {};
      cfg.fields.forEach(f => {
        const el = document.getElementById('exp-'+f.key);
        if (el) data[f.key] = el.value;
      });
      if (isEdit) {
        await fetch(API+'/api/'+tab+'/'+itemId, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data})});
      } else {
        await fetch(API+'/api/'+tab, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({data})});
      }
      closeModal();
      showExpTab(tab);
    };
    document.getElementById('modal').classList.add('show');
  };
  render();
}

async function deleteExp(tab, id) {
  if (!confirm('确定删除？')) return;
  await fetch(API+'/api/'+tab+'/'+id, {method:'DELETE'});
  showExpTab(tab);
}

// ═══ 公司管理 ═══
async function loadCompanies() {
  const companies = await fetch(API+'/api/companies').then(r=>r.json());
  const container = document.getElementById('companies-list');
  if (companies.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏢</div><div class="empty-text">暂无目标公司，点击上方按钮添加</div></div>`;
    return;
  }
  let html = '';
  for (const c of companies) {
    const positions = await fetch(API+'/api/companies/'+c.id+'/positions').then(r=>r.json());
    html += `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${c.name}</div>
          <div class="card-subtitle">${c.industry||''} ${c.location||''} ${c.size||''}</div>
        </div>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm" onclick="showPositionModal(${c.id})">+ 岗位</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCompany(${c.id})">删除</button>
        </div>
      </div>
      ${c.career_page?`<div style="font-size:12px;margin-bottom:8px">官网: <a href="${c.career_page}" target="_blank">${c.career_page}</a></div>`:''}
      ${positions.length>0?`<div style="margin-top:8px">${positions.map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px">
          <span>${p.title} ${p.city?'· '+p.city:''} ${p.salary_range?'· '+p.salary_range:''}</span>
          <div class="btn-group">
            <span class="badge badge-${p.status}">${{pending:'待投递',applied:'已投递',interview:'面试中',rejected:'已拒绝'}[p.status]||p.status}</span>
            <button class="btn btn-ghost btn-sm" onclick="deletePosition(${p.id})">×</button>
          </div>
        </div>`).join('')}</div>`:''}
    </div>`;
  }
  container.innerHTML = html;
}

function showCompanyModal() {
  document.getElementById('modal-title').textContent = '添加目标公司';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">公司名称 *</label><input class="form-input" id="comp-name" placeholder="如：华为"></div>
      <div class="form-group"><label class="form-label">行业</label><input class="form-input" id="comp-industry" placeholder="如：互联网/汽车电子"></div>
      <div class="form-group"><label class="form-label">公司官网</label><input class="form-input" id="comp-website" placeholder="https://..."></div>
      <div class="form-group"><label class="form-label">招聘官网</label><input class="form-input" id="comp-career" placeholder="https://career..."></div>
      <div class="form-group"><label class="form-label">所在地</label><input class="form-input" id="comp-location" placeholder="如：上海"></div>
      <div class="form-group"><label class="form-label">公司规模</label><input class="form-input" id="comp-size" placeholder="如：100-499人"></div>
      <div class="form-group full"><label class="form-label">备注</label><textarea class="form-textarea" id="comp-notes" rows="2"></textarea></div>
    </div>`;
  document.getElementById('modal-confirm').onclick = async () => {
    const data = {
      name: document.getElementById('comp-name').value,
      industry: document.getElementById('comp-industry').value,
      website: document.getElementById('comp-website').value,
      career_page: document.getElementById('comp-career').value,
      location: document.getElementById('comp-location').value,
      size: document.getElementById('comp-size').value,
      notes: document.getElementById('comp-notes').value,
    };
    if (!data.name) { alert('公司名称必填'); return; }
    await fetch(API+'/api/companies', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    closeModal();
    loadCompanies();
  };
  document.getElementById('modal').classList.add('show');
}

async function deleteCompany(id) {
  if (!confirm('确定删除该公司及其所有岗位？')) return;
  await fetch(API+'/api/companies/'+id, {method:'DELETE'});
  loadCompanies();
}

function showPositionModal(companyId) {
  document.getElementById('modal-title').textContent = '添加岗位';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">岗位名称 *</label><input class="form-input" id="pos-title" placeholder="如：嵌入式软件工程师"></div>
      <div class="form-group"><label class="form-label">投递链接</label><input class="form-input" id="pos-url" placeholder="https://career..."></div>
      <div class="form-group"><label class="form-label">部门</label><input class="form-input" id="pos-dept"></div>
      <div class="form-group"><label class="form-label">工作城市</label><input class="form-input" id="pos-city" placeholder="如：上海"></div>
      <div class="form-group"><label class="form-label">薪资范围</label><input class="form-input" id="pos-salary" placeholder="如：15-25K"></div>
      <div class="form-group"><label class="form-label">岗位要求</label><textarea class="form-textarea" id="pos-req" rows="3"></textarea></div>
      <div class="form-group full"><label class="form-label">岗位描述</label><textarea class="form-textarea" id="pos-desc" rows="3"></textarea></div>
    </div>`;
  document.getElementById('modal-confirm').onclick = async () => {
    const data = {
      company_id: companyId,
      title: document.getElementById('pos-title').value,
      url: document.getElementById('pos-url').value,
      department: document.getElementById('pos-dept').value,
      city: document.getElementById('pos-city').value,
      salary_range: document.getElementById('pos-salary').value,
      requirements: document.getElementById('pos-req').value,
      description: document.getElementById('pos-desc').value,
    };
    if (!data.title) { alert('岗位名称必填'); return; }
    await fetch(API+'/api/positions', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    closeModal();
    loadCompanies();
  };
  document.getElementById('modal').classList.add('show');
}

async function deletePosition(id) {
  await fetch(API+'/api/positions/'+id, {method:'DELETE'});
  loadCompanies();
}

// ═══ 岗位列表 ═══
let allPositions = [];

async function loadPositions() {
  allPositions = await fetch(API+'/api/positions/all').then(r=>r.json());
  filterPositions();
}

function filterPositions() {
  const q = document.getElementById('pos-filter').value.toLowerCase();
  const sf = document.getElementById('pos-status-filter').value;
  const filtered = allPositions.filter(p => {
    if (sf && p.status !== sf) return false;
    if (q && !p.title.toLowerCase().includes(q) && !p.company_name.toLowerCase().includes(q)) return false;
    return true;
  });
  renderPositions(filtered);
}

function renderPositions(list) {
  const container = document.getElementById('positions-list');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">💼</div><div class="empty-text">暂无岗位</div></div>`;
    return;
  }
  container.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>公司</th><th>岗位</th><th>城市</th><th>薪资</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${list.map(p=>`<tr>
      <td>${p.company_name}</td>
      <td>${p.title}${p.department?' · '+p.department:''}</td>
      <td>${p.city||'-'}</td>
      <td>${p.salary_range||'-'}</td>
      <td><span class="badge badge-${p.status}">${{pending:'待投递',applied:'已投递',interview:'面试中',rejected:'已拒绝'}[p.status]||p.status}</span></td>
      <td>
        <select class="form-select" style="width:auto;padding:4px 8px;font-size:12px" onchange="updatePosStatus(${p.id},this.value)">
          ${['pending','applied','interview','rejected'].map(s=>`<option ${p.status===s?'selected':''} value="${s}">${{pending:'待投递',applied:'已投递',interview:'面试中',rejected:'已拒绝'}[s]}</option>`).join('')}
        </select>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function updatePosStatus(id, status) {
  await fetch(API+'/api/positions/'+id+'/status', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})});
  loadPositions();
}

// ═══ 一键投递 ═══
async function loadApply() {
  const positions = await fetch(API+'/api/positions/all').then(r=>r.json());
  const pending = positions.filter(p=>p.status==='pending');
  const applied = positions.filter(p=>p.status==='applied');
  document.getElementById('apply-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--yellow)">${pending.length}</div><div class="stat-label">待投递</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${applied.length}</div><div class="stat-label">已投递</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${positions.length}</div><div class="stat-label">总岗位数</div></div>
  `;
  document.getElementById('apply-positions').innerHTML = pending.length === 0
    ? `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">没有待投递的岗位</div></div>`
    : pending.map(p=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="card-title">${p.company_name} · ${p.title}</div>
          <div class="card-subtitle">${p.city||''} ${p.salary_range?'· '+p.salary_range:''}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="applyOne(${p.id},'${(p.url||p.career_page||'').replace(/'/g,"\\'")}')">投递</button>
      </div>`).join('');
}

async function applyOne(positionId, url) {
  if (!url) {
    alert('该岗位没有投递链接，请先在岗位列表中添加投递链接');
    return;
  }
  if (!confirm('即将打开浏览器自动填写表单，填写完成后会暂停等待你确认。继续？')) return;
  const resp = await fetch(API+'/api/apply/'+positionId, {method:'POST'}).then(r=>r.json()).catch(()=>({error:'请求失败'}));
  if (resp.error) alert('错误: '+resp.error);
  else alert('浏览器已打开，填写完成后请检查并手动提交');
}

// ═══ 工具函数 ═══
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// 初始加载
loadProfile();
