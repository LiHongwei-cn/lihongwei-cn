9|:root{--bg:#0e0e12;--bg2:#141418;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--text:#d4d4d8;--dim:rgba(255,255,255,0.40);--gold:#f9e2af;--gold-dim:rgba(249,226,175,0.08);--gold-border:rgba(249,226,175,0.15);--accent:#60a5fa;--radius:12px}
10|*{margin:0;padding:0;box-sizing:border-box}
11|html{scroll-behavior:smooth}
12|body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
13|.container{max-width:1100px;margin:0 auto;padding:24px 20px 80px}
14|.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--dim);text-decoration:none;font-size:13px;margin-bottom:20px;transition:color .2s}
15|.back-link:hover{color:var(--gold)}
16|.hero{text-align:center;padding:32px 0 28px}
17|.hero-badge{display:inline-block;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1.5px;margin-bottom:16px}
18|.hero h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--gold),#fbbf24,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
19|.hero-sub{font-size:14px;color:var(--dim);max-width:500px;margin:0 auto}
20|.search-box{max-width:480px;margin:20px auto;position:relative}
21|.search-box input{width:100%;padding:10px 16px 10px 38px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
22|.search-box input:focus{border-color:var(--gold-border)}
23|.search-box::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
24|.nav-bar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:20px 0 32px}
25|.nav-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);text-decoration:none;font-size:12px;font-weight:500;transition:all .2s}
26|.nav-pill:hover{border-color:var(--pill-color,var(--gold-border));color:var(--text);background:rgba(255,255,255,0.06)}
27|.cat-section{margin-bottom:36px}
28|.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
29|.cat-icon{font-size:18px}
30|.cat-label{font-size:16px;font-weight:700;color:var(--text)}
31|.cat-count{font-size:11px;font-weight:600;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);padding:1px 8px;border-radius:10px}
32|.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
33|.skill-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:border-color .2s,transform .15s}
34|.skill-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-1px)}
35|.skill-name{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px;font-family:'SF Mono','Fira Code','Consolas',monospace}
36|.skill-desc{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:8px;min-height:32px}
37|.no-desc{color:rgba(255,255,255,0.15);font-style:italic}
38|.skill-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
39|.btn-view{display:inline-block;padding:3px 10px;border-radius:6px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);font-size:11px;font-weight:600;text-decoration:none;transition:background .2s}
40|.btn-view:hover{background:rgba(249,226,175,0.15)}
41|.btn-install{display:inline-block;padding:3px 8px;border-radius:6px;background:rgba(0,0,0,0.3);color:#b8c7ff;font-size:10px;font-family:'SF Mono','Consolas',monospace;cursor:pointer;border:1px solid transparent;transition:border-color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
42|.btn-install:hover{border-color:var(--border)}
43|.btn-install.copied{color:#4ade80;border-color:rgba(74,222,128,0.3)}
44|.footer{text-align:center;padding:24px 0 0;border-top:1px solid var(--border);font-size:11px;color:var(--dim)}
45|.footer a{color:var(--gold);text-decoration:none}
46|.hidden{display:none!important}
47|@media(max-width:640px){.container{padding:16px 12px 60px}.hero h1{font-size:24px}.skill-grid{grid-template-columns:1fr}.nav-bar{gap:4px}.nav-pill{font-size:11px;padding:4px 8px}}
