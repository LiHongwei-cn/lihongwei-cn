<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘锦奕 · 生日快乐</title>
<meta name="description" content="刘锦奕生日快乐！来自初中老同学的祝福。">
<style>
:root {
  --bg: #0a0a18;
  --gold: #f0c060;
  --gold-light: #fde68a;
  --text: #e4e4e7;
  --dim: rgba(255,255,255,0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* 背景粒子 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(240,192,96,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(240,192,96,0.04) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(240,192,96,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 24px;
}

/* 蛋糕 */
.cake {
  font-size: 80px;
  margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 名字 */
.name {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), #d4a030);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  letter-spacing: 4px;
}

/* 祝福 */
.wish {
  font-size: 17px;
  color: var(--dim);
  line-height: 2;
  max-width: 460px;
  margin: 0 auto 32px;
  letter-spacing: 0.5px;
}

.wish em {
  font-style: normal;
  color: var(--gold-light);
}

/* 分割线 */
.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 32px;
}

/* 署名 */
.sign {
  font-size: 14px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
}

/* 星星 */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gold);
  border-radius: 50%;
  animation: twinkle 4s ease-in-out infinite;
  opacity: 0;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: 0.6; }
}

@media (max-width: 480px) {
  .cake { font-size: 56px; }
  .name { font-size: 36px; letter-spacing: 2px; }
  .wish { font-size: 15px; line-height: 1.9; }
}
</style>
</head>
<body>

<!-- 星星 -->
<div class="stars">
  <div class="star" style="top:12%;left:15%;animation-delay:0s"></div>
  <div class="star" style="top:18%;left:85%;animation-delay:0.8s"></div>
  <div class="star" style="top:35%;left:8%;animation-delay:1.6s"></div>
  <div class="star" style="top:42%;left:92%;animation-delay:2.4s"></div>
  <div class="star" style="top:55%;left:12%;animation-delay:0.4s"></div>
  <div class="star" style="top:65%;left:88%;animation-delay:1.2s"></div>
  <div class="star" style="top:75%;left:18%;animation-delay:2.0s"></div>
  <div class="star" style="top:82%;left:82%;animation-delay:0.6s"></div>
  <div class="star" style="top:25%;left:25%;animation-delay:2.8s"></div>
  <div class="star" style="top:68%;left:78%;animation-delay:3.2s"></div>
</div>

<div class="container">
  <div class="cake">🎂</div>
  <div class="name">刘锦奕</div>
  <div class="divider"></div>
  <div class="wish">
    又长一岁，愿你<em>所求皆所愿，所行化坦途</em>。<br>
    不管现在身在何方、做着什么，<br>
    初中那几年的同窗情谊一直都在。<br>
    愿你前程似锦，万事胜意。
  </div>
  <div class="sign">老同学 · 2026</div>
</div>

</body>
</html>
