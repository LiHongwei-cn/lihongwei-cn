<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姓名 - 职位</title>
<style>
@media print {
  body { margin: 0; padding: 0; }
  .page { padding: 12mm 14mm; max-width: none; box-shadow: none; }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 820px;
  margin: 24px auto;
  background: #fff;
  padding: 40px 44px 48px;
  box-shadow: 0 1px 12px rgba(0,0,0,0.08);
  border-radius: 4px;
}

/* 头部 */
.header {
  padding-bottom: 20px;
  border-bottom: 2px solid #1a1a2e;
  margin-bottom: 28px;
}

.name {
  font-size: 26px;
  font-weight: 800;
  color: #1a1a2e;
  letter-spacing: 3px;
}

.title-line {
  font-size: 14px;
  color: #555;
  margin-top: 3px;
  font-weight: 500;
}

.contact-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  margin-top: 8px;
  font-size: 12.5px;
  color: #666;
}

.contact-row a {
  color: #2563eb;
  text-decoration: none;
}

.contact-row a:hover { text-decoration: underline; }

/* 分段 */
.section { margin-bottom: 26px; }

.section-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 1.5px solid #e5e7eb;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a2e;
  letter-spacing: 0.5px;
}

.section-accent {
  width: 4px; height: 18px;
  border-radius: 2px;
  background: #2563eb;
  flex-shrink: 0;
}

/* 教育 */
.edu-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.edu-school {
  font-size: 14px;
  font-weight: 600;
  color: #1a1a2e;
}

.edu-major {
  font-size: 12.5px;
  color: #666;
  margin-top: 2px;
}

.edu-date {
  font-size: 12px;
  color: #888;
  white-space: nowrap;
}

/* 技能 */
.skills-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.skill-card {
  background: #fafbfc;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  padding: 12px 14px;
}

.skill-label {
  font-size: 12.5px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.skill-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.skill-items {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.skill-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: #fff;
  color: #444;
  border: 1px solid #e0e0e0;
}

/* 重点项目（带色背景） */
.featured-block {
  background: #fefce8;
  border: 1px solid #fde68a;
  border-radius: 8px;
  padding: 18px 20px;
}

.featured-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.featured-name {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a2e;
  display: flex;
  align-items: center;
  gap: 8px;
}

.featured-badge {
  font-size: 10px;
  background: #fde68a;
  color: #92400e;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 700;
}

.featured-date {
  font-size: 11px;
  color: #888;
  white-space: nowrap;
}

.featured-desc {
  font-size: 12.5px;
  color: #444;
  line-height: 1.7;
  margin-bottom: 14px;
}

.featured-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}

.featured-card {
  background: #fff;
  border: 1px solid #e8eaed;
  border-radius: 6px;
  padding: 10px 12px;
}

.featured-card-title {
  font-size: 11.5px;
  font-weight: 700;
  color: #92400e;
  margin-bottom: 5px;
}

.featured-card-items {
  font-size: 11px;
  color: #555;
  line-height: 1.7;
}

.featured-card-items span {
  display: inline-block;
  background: #f9fafb;
  border: 1px solid #f0f0f0;
  padding: 1px 6px;
  border-radius: 3px;
  margin: 2px 2px 2px 0;
  font-size: 10.5px;
}

.featured-stats {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding-top: 10px;
  border-top: 1px solid #fde68a;
}

.featured-stat {
  display: flex;
  align-items: baseline;
  gap: 3px;
}

.featured-stat-num {
  font-size: 17px;
  font-weight: 800;
  color: #b45309;
}

.featured-stat-label {
  font-size: 11px;
  color: #888;
}

/* 普通项目 */
.project-card {
  background: #fafbfc;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  padding: 13px 15px;
  margin-bottom: 9px;
}

.project-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}

.project-name {
  font-size: 13px;
  font-weight: 700;
  color: #1a1a2e;
}

.project-date {
  font-size: 11px;
  color: #888;
}

.project-desc {
  font-size: 12px;
  color: #555;
  margin-bottom: 7px;
  line-height: 1.65;
}

.project-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.ptag {
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 4px;
  background: #eff6ff;
  color: #2563eb;
  border: 1px solid #dbeafe;
}

/* 证书 */
.cert-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.cert-card {
  background: #fafbfc;
  border: 1px solid #e8eaed;
  border-radius: 8px;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.cert-icon {
  width: 30px; height: 30px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  background: #fef3c7;
}

.cert-name {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a2e;
}

.cert-desc {
  font-size: 11px;
  color: #888;
  margin-top: 1px;
}

/* 底部 */
.footer {
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1.5px solid #e5e7eb;
  text-align: center;
}

.github-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #1a1a2e;
  color: #fff;
  padding: 7px 16px;
  border-radius: 5px;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.2s;
}

.github-btn:hover { background: #2563eb; }

.footer-date {
  font-size: 11px;
  color: #aaa;
  margin-top: 8px;
}

/* 响应式 */
@media (max-width: 640px) {
  .page { padding: 24px 18px 32px; margin: 12px; }
  .header { text-align: center; }
  .contact-row { justify-content: center; }
  .skills-grid { grid-template-columns: 1fr; }
  .featured-grid { grid-template-columns: 1fr; }
  .cert-grid { grid-template-columns: 1fr; }
  .featured-header { flex-direction: column; gap: 6px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- 头部：姓名 + 职位 + 联系方式 -->
  <div class="header">
    <div class="name">姓 名</div>
    <div class="title-line">目标职位 · 专业方向</div>
    <div class="contact-row">
      <span>📞 手机号</span>
      <a href="mailto:邮箱">✉️ 邮箱</a>
      <a href="https://github.com/用户名" target="_blank">🔗 GitHub</a>
    </div>
  </div>

  <!-- 教育背景 -->
  <div class="section">
    <div class="section-head">
      <div class="section-accent"></div>
      <div class="section-title">教育背景</div>
    </div>
    <div class="edu-row">
      <div>
        <div class="edu-school">学校名称</div>
        <div class="edu-major">专业 · 学历</div>
      </div>
      <div class="edu-date">起止时间</div>
    </div>
  </div>

  <!-- 核心技能 -->
  <div class="section">
    <div class="section-head">
      <div class="section-accent"></div>
      <div class="section-title">核心技能</div>
    </div>
    <div class="skills-grid">
      <div class="skill-card">
        <div class="skill-label"><div class="skill-dot" style="background:#b45309"></div>分类名</div>
        <div class="skill-items">
          <span class="skill-tag">技能1</span>
          <span class="skill-tag">技能2</span>
        </div>
      </div>
      <!-- 更多 skill-card... -->
    </div>
  </div>

  <!-- 代表作品（重点项目，用带色背景区块） -->
  <div class="section">
    <div class="section-head">
      <div class="section-accent" style="background:#b45309"></div>
      <div class="section-title">代表作品</div>
    </div>
    <div class="featured-block">
      <div class="featured-header">
        <div class="featured-name">
          项目名称
          <span class="featured-badge">版本号</span>
        </div>
        <div class="featured-date">起止时间</div>
      </div>
      <div class="featured-desc">项目简介...</div>
      <div class="featured-grid">
        <div class="featured-card">
          <div class="featured-card-title">模块标题</div>
          <div class="featured-card-items">
            <span>技术点1</span><span>技术点2</span>
          </div>
        </div>
        <!-- 更多模块卡片... -->
      </div>
      <div class="featured-stats">
        <div class="featured-stat"><span class="featured-stat-num">数字</span><span class="featured-stat-label">标签</span></div>
      </div>
    </div>
  </div>

  <!-- 其他项目 -->
  <div class="section">
    <div class="section-head">
      <div class="section-accent"></div>
      <div class="section-title">项目经历</div>
    </div>
    <div class="project-card">
      <div class="project-header">
        <div class="project-name">项目名称</div>
        <div class="project-date">时间</div>
      </div>
      <div class="project-desc">项目描述...</div>
      <div class="project-tags">
        <span class="ptag">标签1</span>
      </div>
    </div>
  </div>

  <!-- 证书 -->
  <div class="section">
    <div class="section-head">
      <div class="section-accent"></div>
      <div class="section-title">证书资质</div>
    </div>
    <div class="cert-grid">
      <div class="cert-card">
        <div class="cert-icon">⚡</div>
        <div>
          <div class="cert-name">证书名</div>
          <div class="cert-desc">说明</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <a href="https://github.com/用户名" target="_blank" class="github-btn">
      github.com/用户名/仓库
    </a>
    <div class="footer-date">简历更新 · 年 月</div>
  </div>

</div>
</body>
</html>
